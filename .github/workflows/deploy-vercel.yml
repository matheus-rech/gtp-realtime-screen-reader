name: Deploy to Vercel
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://your-backend-url.com' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build --workspace frontend

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel environment configuration
      run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd apps/frontend

    - name: Deploy to Vercel
      run: vercel deploy --prod --yes --token "$VERCEL_TOKEN" --cwd apps/frontend